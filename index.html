body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;color:#222;font-size:13px}

.header-logo{display:flex;align-items:center;gap:10px}

.header-actions{display:flex;gap:8px;align-items:center;padding:8px 0}

.content{padding:16px 20px;max-width:1400px;margin:0 auto}

.stat-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}

.stat-card .val{font-size:20px;font-weight:700;color:#1a3a5c;font-family:monospace}

.form-card{background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.form-title{font-size:12px;font-weight:700;color:#1a3a5c;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eef0f3;display:flex;align-items:center;gap:6px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select{border:1px solid #dde3ea;border-radius:5px;color:#222;padding:6px 9px;font-size:12px;font-family:'Noto Sans KR',sans-serif;width:100%;background:#fff}
.fg input:focus,.fg select:focus{outline:none;border-color:#1a3a5c;box-shadow:0 0 0 2px rgba(26,58,92,.08)}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.btn{padding:7px 14px;border-radius:5px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:#1a3a5c;color:#fff}
.btn-primary:hover{background:#0f2744}
.btn-excel{background:#217346;color:#fff}
.btn-excel:hover{background:#185c37}
.btn-secondary{background:#fff;color:#444;border:1px solid #dde3ea}
.btn-secondary:hover{background:#f5f5f5}
.btn-danger{background:#fff0f0;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:4px 9px;font-size:11px}

.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:10px 14px}
.filter-bar input,.filter-bar select{border:1px solid #dde3ea;border-radius:5px;padding:6px 9px;font-size:12px;font-family:'Noto Sans KR',sans-serif}

.cat-tabs{display:flex;gap:0;overflow-x:auto;background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:0 6px;margin-bottom:12px}
.cat-tab{padding:11px 14px;font-size:12.5px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.cat-tab:hover{color:#1a3a5c;background:#f8f9fb}
.cat-tab.active{color:#1a3a5c;border-bottom-color:#1a3a5c;font-weight:700}
.cat-tab .badge{display:inline-block;background:#eef0f3;color:#666;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:5px;font-weight:700}
.cat-tab.active .badge{background:#1a3a5c;color:#fff}

.menu-header td{background:#eef2f7;font-weight:700;padding:9px 12px;border-top:2px solid #1a3a5c}
.menu-header-inner{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.menu-header .mh-name{color:#1a3a5c;font-size:13px}
.menu-header .mh-count{font-size:11px;color:#888;font-weight:500}
.menu-header .grow{flex:1}
.menu-header .edit-input{max-width:160px}

.tbl-card{background:#fff;border:1px solid #dde3ea;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tbl-header{padding:12px 16px;border-bottom:1px solid #dde3ea;display:flex;align-items:center;justify-content:space-between;background:#fff}
.tbl-header h3{font-size:13px;font-weight:700;color:#1a3a5c}
.tbl-cnt{font-size:11px;color:#2563eb;background:#eff6ff;padding:2px 9px;border-radius:10px;font-weight:600;border:1px solid #bfdbfe}
.tbl-wrap{overflow-x:auto;max-height:70vh;overflow-y:auto}

table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{padding:9px 10px;text-align:center;font-size:11.5px;font-weight:700;color:#333;border:1px solid #d0d7de;white-space:nowrap;background:#f0f4f8;position:sticky;top:0;z-index:2}
tbody tr{border-bottom:1px solid #e8ecf0}
tbody tr:hover{background:#f8fbff}
tbody tr.menu-start td{border-top:2px solid #1a3a5c}
tbody td{padding:6px 10px;border:1px solid #e8ecf0;vertical-align:middle}
tbody td.center{text-align:center}
tbody td.right{text-align:right;font-family:monospace}
tbody td.code{font-family:monospace;font-size:11.5px;color:#666;text-align:center}
tbody td.note{font-size:11px;color:#666;max-width:260px}
.cat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:700;white-space:nowrap;background:#e5e7eb;color:#374151}
.flag-row td{background:#fff7ed}
.actions{display:flex;gap:4px;justify-content:center}
.edit-input{width:100%;border:1px solid #93c5fd;border-radius:4px;padding:3px 5px;font-size:12px}
.empty{padding:40px;text-align:center;color:#999}
.footer-note{font-size:11px;color:#999;text-align:center;padding:18px 0}

.cat-cell-보난자 { background:#fde68a !important; color:#78350f !important; font-weight:700; }

  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="refreshNow()">🔄 새로고침</button>
    <button class="btn btn-secondary" onclick="seedInitialData()">📥 초기 데이터 불러오기</button>

    <button class="btn btn-secondary" onclick="removeDuplicates()">🧹 중복 제거</button>
    <button class="btn btn-danger" onclick="deleteAllData()">🗑 전체 삭제</button>
  </div>
</div>

<div class="content">

      </div>
      <div class="fg"><label>메뉴명 *</label><input type="text" id="in_menu" list="menuList" placeholder="예: 아메리카노 HOT (기존 메뉴명과 같으면 그 메뉴에 추가됨)"></div>

      <div class="fg"><label>재료명</label><input type="text" id="in_name" placeholder="품목표 정식 명칭"></div>
      <div class="fg"><label>사용량 *</label><input type="number" step="0.01" id="in_qty" placeholder="예: 19"></div>
      <div class="fg"><label>사용단위</label><input type="text" id="in_unit" value="g"></div>
      <div class="fg"><label>비고</label><input type="text" id="in_note" placeholder="추정치/확인필요 등"></div>
    </div>
    <datalist id="itemMasterList"></datalist>
    <datalist id="catList"><option value="커피">커피</option>
<option value="보난자">보난자</option>
<option value="콜드브루">콜드브루</option>
<option value="에스프레소바">에스프레소바</option>
<option value="웰니스">웰니스</option>
<option value="티">티</option>
<option value="음료">음료</option>
<option value="시그니처">시그니처</option></datalist>
    <datalist id="menuList"></datalist>
    <div class="form-row">
      <button class="btn btn-primary" onclick="addRow()">✚ 추가</button>
      <button class="btn btn-secondary" onclick="clearForm()">↺ 초기화</button>
    </div>
  </div>

  <div class="cat-tabs" id="catTabs"></div>

  <div class="filter-bar">
    <input type="text" id="f_search" placeholder="메뉴명 · 재료명 · 제품코드 검색" oninput="render()" style="min-width:220px">
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#555">
      <input type="checkbox" id="f_flagOnly" onchange="render()"> 확인 필요만 보기
    </label>
    <button class="btn btn-secondary btn-sm" onclick="resetFilter()">✕ 초기화</button>
  </div>

  <div class="tbl-card">
    <div class="tbl-header">
      <h3>영양성분표 품목매칭</h3>
      <span class="tbl-cnt" id="tblCnt">0건</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>

            <th style="min-width:220px">재료명</th>
            <th style="width:80px">사용량</th>

        <tbody id="tbody">

        </tbody>

</div>

// ── 실시간 동기화 ──
let hasAutoSeeded = false;
let hasMigrated = false;
// 예전 버전(그룹 구분 필드가 없던 시절)에 이미 시드된 데이터를 위한 1회성 보정.
// category+menu가 같은 문서들을 묶어 groupOrder/order를 새로 부여하고 Firestore에 저장한다.
// 기존 문서를 지우지 않고 필드만 채워 넣으므로 안전하다.
async function migrateGroupOrdersIfNeeded(){
  if (hasMigrated) return;
  const needsMigration = allRows.some(r => r.groupOrder === undefined || r.groupOrder === null || r.order === undefined || r.order === null);
  if (!needsMigration) { hasMigrated = true; return; }
  hasMigrated = true;
  const groups = new Map();
  let nextG = 0;
  allRows.forEach(r => {
    const key = (r.category || '') + '||' + (r.menu || '');
    if (!groups.has(key)) groups.set(key, { groupOrder: nextG++, rows: [] });
    groups.get(key).rows.push(r);
  });
  let batch = db.batch();
  let count = 0;
  for (const { groupOrder, rows: gRows } of groups.values()) {
    for (let i = 0; i < gRows.length; i++) {
      batch.update(colRef.doc(gRows[i].id), { groupOrder, order: i });
      count++;
      if (count % 400 === 0) { await batch.commit(); batch = db.batch(); }
    }
  }
  await batch.commit();
}

function startListening(){
  // 서버 정렬(orderBy) 없이 전체를 받아온 뒤 클라이언트에서 (groupOrder, order)로 정렬한다.
  // -> 복합 인덱스가 필요없고, 메뉴별로 항상 묶여서 보인다.
  colRef.onSnapshot(snap => {
    allRows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allRows.sort((a, b) => (a.groupOrder ?? 0) - (b.groupOrder ?? 0) || (a.order ?? 0) - (b.order ?? 0));
    document.getElementById('syncStatus').textContent = '● 실시간 동기화';
    document.getElementById('syncStatus').style.color = '#16a34a';
    refreshCatOptions();
    render();
    // 데이터가 하나도 없는 첫 실행이면 초기 데이터를 자동으로 채워준다
    if (!hasAutoSeeded && allRows.length === 0) {
      hasAutoSeeded = true;
      seedRows(SEED_DATA, 0, true);
    } else {
      migrateGroupOrdersIfNeeded();
      autoRemoveDuplicatesIfNeeded();
    }
  }, err => {
    console.error(err);
    document.getElementById('syncStatus').textContent = '⚠ 연결 오류';
    document.getElementById('syncStatus').style.color = '#dc2626';
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="6" class="empty">⚠ Firestore 연결에 실패했습니다.<br>Firebase 콘솔 &gt; Firestore Database &gt; 규칙에서 읽기/쓰기 권한이 열려 있는지 확인해주세요.<br><span style="font-size:10px;color:#bbb">' + esc(err.message || err) + '</span></td></tr>';
  });
}

// ── 공통 시드 유틸 (data의 각 항목은 이미 groupOrder/order를 가지고 있음) ──
async function seedRows(data, groupOrderOffset, silent){
  let batch = db.batch();
  let count = 0;
  for (let i = 0; i < data.length; i++) {
    const ref = colRef.doc();
    const row = { ...data[i] };
    row.groupOrder = (row.groupOrder ?? 0) + groupOrderOffset;
    batch.set(ref, row);
    count++;
    if (count % 400 === 0) {
      await batch.commit();
      batch = db.batch();
    }
  }
  await batch.commit();
  if (!silent) alert(data.length + '건을 불러왔습니다.');
}

function nextGroupOrder(){
  return allRows.length ? Math.max(...allRows.map(r => r.groupOrder ?? 0)) + 1 : 0;
}

// ── 초기 데이터 시드(수동 버튼) ──
async function seedInitialData(){
  const snap = await colRef.limit(1).get();
  if (!snap.empty) {
    if (!confirm('이미 데이터가 있습니다. 초기 데이터를 다시 불러오면 중복될 수 있습니다. 계속할까요?')) return;
  }
  await seedRows(SEED_DATA, nextGroupOrder(), false);
}

function initApp(){
  if (typeof firebase === 'undefined') {
    document.getElementById('syncStatus').textContent = '⚠ 로드 실패';
    document.getElementById('syncStatus').style.color = '#dc2626';
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="6" class="empty">⚠ Firebase 라이브러리를 불러오지 못했습니다.<br>인터넷 연결 상태를 확인하거나, 광고 차단/스크립트 차단 확장 프로그램을 꺼둔 뒤 새로고침 해주세요.<br>(이 페이지를 미리보기 창이 아닌 실제 배포된 주소에서 열고 있는지도 확인해주세요.)</td></tr>';
    return;
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  colRef = db.collection('nutritionRows');
  refreshCatOptions();
  startListening();
}
initApp();

function normalizeImportedRow(obj){
  // 헤더 이름이 한글(카테고리/메뉴명/...)이든, 우리 내부 필드명이든 모두 허용
  const pick = (...keys) => {
    for (const k of keys) {
      if (obj[k] !== undefined && obj[k] !== '') return obj[k];
    }
    return '';
  };
  return {
    category: String(pick('카테고리','category')).trim(),
    menu: String(pick('메뉴명','menu')).replace(/\n/g, ' ').trim(),
    productCode: String(pick('제품코드','productCode')).trim(),
    ingredientName: String(pick('재료명','ingredientName')).trim(),
    qty: parseFloat(pick('사용량','qty')) || 0,
    unit: String(pick('사용단위','단위','unit')) || 'g',
    note: String(pick('비고','note')),
  };
}

// 같은 카테고리+메뉴명이 연속으로 나오면 같은 groupOrder를 부여 (엑셀에서 메뉴별로 묶여있다고 가정)
function assignGroupOrders(rows, startGroupOrder){
  let g = startGroupOrder - 1;
  let orderInGroup = 0;
  let lastKey = null;
  return rows.map(r => {
    const key = r.category + '||' + r.menu;
    if (key !== lastKey) {
      g += 1;
      orderInGroup = 0;
      lastKey = key;
    } else {
      orderInGroup += 1;
    }
    return { ...r, groupOrder: g, order: orderInGroup };
  });
}

async function handleExcelImport(event){
  const file = event.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const sheetName = wb.SheetNames[0];
  const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });

  const parsed = json
    .map(normalizeImportedRow)
    .filter(r => r.category && r.menu); // 빈 구분용 행 제외

  if (parsed.length === 0) {
    alert('가져올 수 있는 데이터가 없습니다. 헤더가 카테고리/메뉴명/제품코드/재료명/사용량/사용단위/비고 형식인지 확인해주세요.');
    event.target.value = '';
    return;
  }

  const replace = confirm(
    parsed.length + '건을 찾았습니다.\n\n[확인] = 기존 데이터를 모두 지우고 이걸로 교체\n[취소] = 기존 데이터 뒤에 추가만'
  );

  if (replace) {
    await deleteAllDocs();
    allRows = [];
  }

  const imported = assignGroupOrders(parsed, nextGroupOrder());
  let batch = db.batch();
  let count = 0;
  for (let i = 0; i < imported.length; i++) {
    const ref = colRef.doc();
    batch.set(ref, imported[i]);
    count++;
    if (count % 400 === 0) {
      await batch.commit();
      batch = db.batch();
    }
  }
  await batch.commit();
  alert(imported.length + '건을 가져왔습니다.');
  event.target.value = '';
}

async function deleteAllDocs(){
  const snap = await colRef.get();
  let batch = db.batch();
  let count = 0;
  for (const doc of snap.docs) {
    batch.delete(doc.ref);
    count++;
    if (count % 400 === 0) {
      await batch.commit();
      batch = db.batch();
    }
  }
  await batch.commit();
}

async function deleteAllData(){
  if (!confirm('정말 전체 데이터를 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  if (!confirm('마지막 확인입니다. 정말 전체 삭제할까요?')) return;
  await deleteAllDocs();
  alert('전체 삭제되었습니다.');
}

// ── 중복 제거 (같은 그룹 안에서 제품코드+재료명+사용량+단위+비고가 완전히 같은 행을 하나만 남김) ──
function findDuplicateIds(){
  const seen = new Set();
  const toDelete = [];
  allRows.forEach(r => {
    const key = [r.groupOrder, r.productCode, r.ingredientName, r.qty, r.unit, r.note].join('||');
    if (seen.has(key)) {
      toDelete.push(r.id);
    } else {
      seen.add(key);
    }
  });
  return toDelete;
}

async function removeDuplicates(){
  const dupIds = findDuplicateIds();
  if (dupIds.length === 0) {
    alert('완전히 중복된 항목이 없습니다.');
    return;
  }
  if (!confirm(`완전히 동일한 중복 항목 ${dupIds.length}건을 발견했습니다. 각 그룹당 1개만 남기고 나머지를 삭제할까요?`)) return;
  let batch = db.batch();
  let count = 0;
  for (const id of dupIds) {
    batch.delete(colRef.doc(id));
    count++;
    if (count % 400 === 0) { await batch.commit(); batch = db.batch(); }
  }
  await batch.commit();
  alert(dupIds.length + '건의 중복 항목을 삭제했습니다.');
}

// 완전 동일 중복은 사용자 확인 없이도 자동으로 한 번 정리한다 (버튼을 누르지 않아도 접속 시 바로 정리됨)
let hasAutoDeduped = false;
async function autoRemoveDuplicatesIfNeeded(){
  if (hasAutoDeduped) return;
  const dupIds = findDuplicateIds();
  if (dupIds.length === 0) { hasAutoDeduped = true; return; }
  hasAutoDeduped = true;
  let batch = db.batch();
  let count = 0;
  for (const id of dupIds) {
    batch.delete(colRef.doc(id));
    count++;
    if (count % 400 === 0) { await batch.commit(); batch = db.batch(); }
  }
  await batch.commit();
}

// 카테고리+메뉴명이 같은 기존 그룹을 찾아 groupOrder/다음order를 계산 (없으면 새 그룹)
function resolveGroupFor(category, menu){
  const siblings = allRows.filter(r => r.category === category && r.menu === menu);
  if (siblings.length > 0) {
    return {
      groupOrder: siblings[0].groupOrder ?? 0,
      order: Math.max(...siblings.map(r => r.order ?? 0)) + 1,
    };
  }
  return { groupOrder: nextGroupOrder(), order: 0 };
}

// ── 추가 ──
async function addRow(){
  const cat = document.getElementById('in_cat').value.trim();
  const menu = document.getElementById('in_menu').value.trim();
  const qty = document.getElementById('in_qty').value;
  if (!cat || !menu || qty === '') {
    alert('카테고리, 메뉴명, 사용량은 필수입니다.');
    return;
  }
  const { groupOrder, order } = resolveGroupFor(cat, menu);
  const row = {
    category: cat,
    menu: menu,
    productCode: document.getElementById('in_code').value.trim(),
    ingredientName: document.getElementById('in_name').value.trim(),
    qty: parseFloat(qty),
    unit: document.getElementById('in_unit').value || 'g',
    note: document.getElementById('in_note').value.trim(),
    groupOrder, order,
  };
  await colRef.add(row);
  clearForm();
}

function clearForm(){
  ['in_cat','in_menu','in_code','in_name','in_qty','in_note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('in_unit').value = 'g';
}

// ── 메뉴별 재료 빠른 추가 (수정 화면에서 행 추가) ──
function startQuickAdd(groupOrder){
  quickAddGroup = groupOrder;
  editingId = null;
  editingMenuGroup = null;
  render();
  setTimeout(() => { const el = document.getElementById('qa_code'); if (el) el.focus(); }, 0);
}
function cancelQuickAdd(){
  quickAddGroup = null;
  render();
}
async function saveQuickAdd(groupOrder){
  const siblings = allRows.filter(r => r.groupOrder === groupOrder);
  if (siblings.length === 0) return;
  const { category, menu } = siblings[0];
  const get = (id) => (document.getElementById(id) || {}).value || '';
  const qty = get('qa_qty');
  if (qty === '') { alert('사용량을 입력해주세요.'); return; }
  const order = Math.max(...siblings.map(r => r.order ?? 0)) + 1;
  await colRef.add({
    category, menu,
    productCode: get('qa_code').trim(),
    ingredientName: get('qa_name').trim(),
    qty: parseFloat(qty),
    unit: get('qa_unit') || 'g',
    note: get('qa_note').trim(),
    groupOrder, order,
  });
  quickAddGroup = null;
  render();
}
function onQaCodeInput(){
  const el = document.getElementById('qa_code');
  const code = el ? el.value.trim() : '';
  if (code && MASTER_ITEMS[code]) {
    document.getElementById('qa_name').value = MASTER_ITEMS[code];
  }
}

// ── 삭제 ──
async function deleteRow(id){
  if (!confirm('이 항목을 삭제할까요?')) return;
  await colRef.doc(id).delete();
}

// ── 수정 ──
function startEdit(id){
  editingId = id;
  quickAddGroup = null;
  editingMenuGroup = null;
  render();
}
function cancelEdit(){
  editingId = null;
  render();
}
async function saveEdit(id){
  const get = (f) => document.getElementById(`edit_${f}_${id}`).value;
  const updated = {
    productCode: get('productCode'),
    ingredientName: get('ingredientName'),
    qty: parseFloat(get('qty')) || 0,
    unit: get('unit'),
    note: get('note'),
  };
  await colRef.doc(id).update(updated);
  editingId = null;
  render();
}

function resetFilter(){
  currentCat = '';
  document.getElementById('f_search').value = '';
  document.getElementById('f_flagOnly').checked = false;
  refreshCatOptions();
  render();
}

function esc(s){
  return (s === undefined || s === null) ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function isFlagged(r){
  return /확인\s*필요|미등록/.test(r.note || '') || /\*\*미등록/.test(r.ingredientName || '');
}

// ── 메뉴 단위 수정/삭제 ──
function startEditMenuGroup(groupOrder){
  editingMenuGroup = groupOrder;
  editingId = null;
  quickAddGroup = null;
  render();
}
function cancelEditMenuGroup(){
  editingMenuGroup = null;
  render();
}
async function saveEditMenuGroup(groupOrder){
  const newCat = (document.getElementById('mg_cat') || {}).value?.trim();
  const newMenu = (document.getElementById('mg_menu') || {}).value?.trim();
  if (!newCat || !newMenu) { alert('카테고리와 메뉴명을 입력해주세요.'); return; }
  const siblings = allRows.filter(r => r.groupOrder === groupOrder);
  let batch = db.batch();
  siblings.forEach(r => batch.update(colRef.doc(r.id), { category: newCat, menu: newMenu }));
  await batch.commit();
  editingMenuGroup = null;
  render();
}
async function deleteMenuGroup(groupOrder){
  const siblings = allRows.filter(r => r.groupOrder === groupOrder);
  if (!confirm(`이 메뉴(재료 ${siblings.length}개)를 통째로 삭제할까요?`)) return;
  let batch = db.batch();
  siblings.forEach(r => batch.delete(colRef.doc(r.id)));
  await batch.commit();
}

// ── 렌더링 ──
function render(){
  const search = document.getElementById('f_search').value.trim().toLowerCase();
  const flagOnly = document.getElementById('f_flagOnly').checked;

  let rows = allRows.filter(r => {
    if (currentCat && r.category !== currentCat) return false;
    if (flagOnly && !isFlagged(r)) return false;
    if (search) {
      const hay = [r.menu, r.ingredientName, r.productCode, r.note].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('tbody');
  document.getElementById('tblCnt').textContent = rows.length + '건';

  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">표시할 데이터가 없습니다.</td></tr>';
  } else {
    let lastGroup = null;
    const html = [];
    rows.forEach((r, idx) => {
      const isStart = r.groupOrder !== lastGroup;
      lastGroup = r.groupOrder;
      const isLastOfGroup = (idx === rows.length - 1) || (rows[idx + 1].groupOrder !== r.groupOrder);

      if (isStart) {
        const groupCount = rows.filter(x => x.groupOrder === r.groupOrder).length;
        if (editingMenuGroup === r.groupOrder) {
          html.push(`<tr class="menu-header">
            <td colspan="6"><div class="menu-header-inner">
              <input class="edit-input" id="mg_cat" list="catList" value="${esc(r.category)}" style="max-width:130px">
              <input class="edit-input" id="mg_menu" value="${esc(r.menu)}" style="max-width:220px">
              <span class="grow"></span>
              <button class="btn btn-primary btn-sm" onclick="saveEditMenuGroup(${r.groupOrder})">저장</button>
              <button class="btn btn-secondary btn-sm" onclick="cancelEditMenuGroup()">취소</button>
            </div></td>
          </tr>`);
        } else {
          html.push(`<tr class="menu-header">
            <td colspan="6"><div class="menu-header-inner">
              <span class="cat cat-cell-${esc(r.category)}">${esc(r.category)}</span>
              <span class="mh-name">${esc(r.menu)}</span>
              <span class="mh-count">재료 ${groupCount}개</span>
              <span class="grow"></span>
              <button class="btn btn-secondary btn-sm" onclick="startEditMenuGroup(${r.groupOrder})">✏️ 메뉴 수정</button>
              <button class="btn btn-secondary btn-sm" title="이 메뉴에 재료 추가" onclick="startQuickAdd(${r.groupOrder})">➕ 재료 추가</button>
              <button class="btn btn-danger btn-sm" onclick="deleteMenuGroup(${r.groupOrder})">🗑 메뉴 삭제</button>
            </div></td>
          </tr>`);
        }
      }

      const rowClass = isFlagged(r) ? 'flag-row' : '';
      if (editingId === r.id) {
        html.push(`<tr class="${rowClass}">
          <td><input class="edit-input" id="edit_productCode_${r.id}" value="${esc(r.productCode)}"></td>
          <td><input class="edit-input" id="edit_ingredientName_${r.id}" value="${esc(r.ingredientName)}"></td>
          <td><input class="edit-input" id="edit_qty_${r.id}" value="${esc(r.qty)}"></td>
          <td><input class="edit-input" id="edit_unit_${r.id}" value="${esc(r.unit)}"></td>
          <td><input class="edit-input" id="edit_note_${r.id}" value="${esc(r.note)}"></td>
          <td class="actions">
            <button class="btn btn-primary btn-sm" onclick="saveEdit('${r.id}')">저장</button>
            <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">취소</button>
          </td>
        </tr>`);
      } else {
        html.push(`<tr class="${rowClass}">
          <td class="code">${esc(r.productCode)}</td>
          <td>${esc(r.ingredientName)}</td>
          <td class="right">${esc(r.qty)}</td>
          <td class="center">${esc(r.unit)}</td>
          <td class="note">${esc(r.note)}</td>
          <td class="actions">
            <button class="btn btn-secondary btn-sm" onclick="startEdit('${r.id}')">수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRow('${r.id}')">삭제</button>
          </td>
        </tr>`);
      }

      if (isLastOfGroup && quickAddGroup === r.groupOrder) {
        html.push(`<tr class="flag-row">
          <td><input class="edit-input" id="qa_code" list="itemMasterList" placeholder="제품코드" oninput="onQaCodeInput()"></td>
          <td><input class="edit-input" id="qa_name" placeholder="재료명"></td>
          <td><input class="edit-input" id="qa_qty" type="number" step="0.01" placeholder="사용량"></td>
          <td><input class="edit-input" id="qa_unit" value="g"></td>
          <td><input class="edit-input" id="qa_note" placeholder="비고"></td>
          <td class="actions">
            <button class="btn btn-primary btn-sm" onclick="saveQuickAdd(${r.groupOrder})">저장</button>
            <button class="btn btn-secondary btn-sm" onclick="cancelQuickAdd()">취소</button>
          </td>
        </tr>`);
      }
    });
    tbody.innerHTML = html.join('');
  }

  // 통계 (현재 탭/검색 기준)
  document.getElementById('statTotal').textContent = rows.length;
  document.getElementById('statMenus').textContent = new Set(rows.map(r => r.groupOrder)).size;
  document.getElementById('statCats').textContent = new Set(allRows.map(r => r.category)).size;
  document.getElementById('statFlag').textContent = rows.filter(isFlagged).length;
}

// ── Excel 내보내기 ──
function exportExcel(){
  const search = document.getElementById('f_search').value.trim().toLowerCase();
  const flagOnly = document.getElementById('f_flagOnly').checked;
  let rows = allRows.filter(r => {
    if (currentCat && r.category !== currentCat) return false;
    if (flagOnly && !isFlagged(r)) return false;
    if (search) {
      const hay = [r.menu, r.ingredientName, r.productCode, r.note].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  const data = rows.map(r => ({
    '카테고리': r.category, '메뉴명': r.menu,
    '제품코드': r.productCode, '재료명': r.ingredientName, '사용량': r.qty,
    '사용단위': r.unit, '비고': r.note,
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '영양성분표');
  XLSX.writeFile(wb, 'recipe_nutrition_item_mapping.xlsx');
}
